name: Build & Release

on:
  push:
    branches:
      - master
      - main

jobs:
  release:
    name: Build release APK and publish GitHub Release
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Read version ──────────────────────────────────────────────────────
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # ── Skip if already released ──────────────────────────────────────────
      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install JS dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      # ── Java + Gradle cache ───────────────────────────────────────────────
      - name: Setup Java 17
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      # ── Android keystore ──────────────────────────────────────────────────
      - name: Decode keystore
        if: steps.tag_check.outputs.exists == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d ' \r' | base64 -d \
            > android/app/utxwallet-release.keystore

      - name: Write keystore.properties
        if: steps.tag_check.outputs.exists == 'false'
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf '%s=%s\n' "UTXWALLET_UPLOAD_STORE_FILE"     "utxwallet-release.keystore" >  android/keystore.properties
          printf '%s=%s\n' "UTXWALLET_UPLOAD_KEY_ALIAS"      "$KEY_ALIAS"                 >> android/keystore.properties
          printf '%s=%s\n' "UTXWALLET_UPLOAD_STORE_PASSWORD" "$KEYSTORE_PASSWORD"         >> android/keystore.properties
          printf '%s=%s\n' "UTXWALLET_UPLOAD_KEY_PASSWORD"   "$KEY_PASSWORD"              >> android/keystore.properties

      # ── Build signed release APK ──────────────────────────────────────────
      - name: Grant Gradle execute permission
        if: steps.tag_check.outputs.exists == 'false'
        run: chmod +x android/gradlew

      - name: Build release APK
        if: steps.tag_check.outputs.exists == 'false'
        run: cd android && ./gradlew assembleRelease --no-daemon

      # ── Upload APK as workflow artifact ───────────────────────────────────
      - name: Upload APK artifact
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: utxwallet-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: UTXWallet ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/app-release.apk
