name: Build & Publish to Zap Store

on:
  push:
    branches:
      - master
      - main

jobs:
  publish:
    name: Build release APK and publish to Zap Store
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # ── Java + Gradle cache ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      # ── Android keystore ──────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d ' \r' | base64 -d \
            > android/app/utxwallet-release.keystore

      - name: Write keystore.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf '%s=%s\n' "UTXWALLET_UPLOAD_STORE_FILE"     "utxwallet-release.keystore" >  android/keystore.properties
          printf '%s=%s\n' "UTXWALLET_UPLOAD_KEY_ALIAS"      "$KEY_ALIAS"                 >> android/keystore.properties
          printf '%s=%s\n' "UTXWALLET_UPLOAD_STORE_PASSWORD" "$KEYSTORE_PASSWORD"         >> android/keystore.properties
          printf '%s=%s\n' "UTXWALLET_UPLOAD_KEY_PASSWORD"   "$KEY_PASSWORD"              >> android/keystore.properties

      # ── Build signed release APK ──────────────────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      # ── Upload APK as workflow artifact ───────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: utxwallet-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── Install zapstore-cli ──────────────────────────────────────────────
      # Binary releases: https://github.com/zapstore/zapstore-cli/releases
      - name: Install zapstore-cli
        run: |
          ZAPSTORE_VERSION=$(curl -s https://api.github.com/repos/zapstore/zapstore-cli/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL \
            "https://github.com/zapstore/zapstore-cli/releases/download/${ZAPSTORE_VERSION}/zapstore-cli-${ZAPSTORE_VERSION}-linux-amd64" \
            -o zapstore
          chmod +x zapstore
          sudo mv zapstore /usr/local/bin/zapstore
          zapstore --version

      # ── Publish to Zap Store ──────────────────────────────────────────────
      - name: Publish to Zap Store
        run: zapstore publish
        env:
          NOSTR_SECRET_KEY: ${{ secrets.NOSTR_SECRET_KEY }}
