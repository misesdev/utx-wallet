# zapstore.yaml — UTX Wallet
# Configuration for zapstore-cli (https://github.com/zapstore/zapstore-cli)
# Publishes app metadata and releases to the Zap Store (https://zapstore.dev),
# a decentralized Nostr-based app store for Android apps.

identifier: com.misesdev.utxwallet
name: UTX Wallet

summary: Self-custodial Bitcoin wallet with personal node and full UTXO control

description: |
  UTX Wallet is a self-custodial Bitcoin wallet for users who take sovereignty
  seriously. Your keys never leave your device, your transactions stay private,
  and you choose which node validates your data.

  YOUR KEYS, YOUR BITCOIN

  Seeds and private keys are stored exclusively on your device using encrypted
  storage and are never transmitted anywhere. Create a wallet from a fresh
  BIP39 mnemonic or import any 12/24-word seed phrase with optional passphrase
  (25th word). Watch-only wallets via xpub or output descriptor are supported.

  PERSONAL NODE — TRUE PRIVACY

  Connect to your own self-hosted Mempool.space instance. Configure multiple
  nodes with custom priority ordering and automatic failover. Public API
  fallback is off by default.

  FULL UTXO CONTROL

  View every UTXO with value, address, and confirmation status. Freeze
  individual UTXOs to exclude them from coin selection. Address-grouped coin
  selection and Replace-By-Fee (RBF) for stuck transactions.

  MESSAGE SIGNING

  Sign any text with your wallet key and share the result as a compact QR
  code. Verify signatures from other wallets directly in-app.

  SECURITY

  • Biometric unlock on app open with PIN fallback
  • Screenshot prevention (Android FLAG_SECURE)
  • Seed auto-hides when switching apps
  • PIN + biometric auto-lock with configurable timeout
  • Balance hidden across all screens with eye-button reveal
  • Navigation state never contains seeds or private keys

  OPEN SOURCE

  Free, open source, no ads, no analytics, no telemetry.

  Source: https://github.com/misesdev/utx-wallet

repository: https://github.com/misesdev/utx-wallet
license: MIT

