# zapstore.yaml — UTX Wallet
# Configuration for zapstore-cli (https://github.com/zapstore/zapstore-cli)
# Publishes app metadata and releases to the Zap Store (https://zapstore.dev),
# a decentralized Nostr-based app store for Android apps.

identifier: com.misesdev.utxwallet
name: UTX Wallet

summary: Self-custodial Bitcoin wallet with personal node and full UTXO control

description: |
  UTX Wallet is a self-custodial Bitcoin wallet built for users who take their
  sovereignty seriously. Your keys never leave your device, your transactions
  stay private, and you choose which node validates your data.

  YOUR KEYS, YOUR BITCOIN

  UTX Wallet generates and stores your seed phrase exclusively on your device
  using encrypted storage. Private keys are derived from your seed only at the
  moment of signing and are never persisted anywhere.

  Create a new wallet from a freshly generated 12-word BIP39 seed, or import
  any existing wallet with a 12 or 24-word seed phrase. BIP39 passphrase
  (25th word) is fully supported.

  PERSONAL NODE — TRUE PRIVACY

  Connect to your own self-hosted Mempool.space instance so that no third party
  ever sees your wallet data.

  • Multiple personal nodes with custom priority ordering
  • Automatic failover if a node is unreachable
  • Public API fallback OFF by default
  • Built-in node setup guide: Docker, Umbrel, RaspiBlitz, Start9

  FULL UTXO CONTROL

  • View every UTXO with value, address, and confirmation status
  • Freeze individual UTXOs to exclude from coin selection
  • Address-grouped coin selection reduces fund traceability
  • Replace-By-Fee (RBF) to accelerate stuck transactions

  SEND & RECEIVE

  • Native SegWit BIP84 addresses (bc1q)
  • Fee presets: fast, half-hour, hour, economy — from real-time blockchain data
  • Full transaction preview before signing
  • QR code scanning for addresses and wallet import

  SECURITY

  • PIN code + biometric (fingerprint / face) protection
  • Auto-lock with configurable timeout
  • Hide balance across all screens
  • Watch-only wallet support (xpub / output descriptor)

  OPEN SOURCE

  UTX Wallet is free, open source, and contains no ads, no analytics, and no
  telemetry. Your data belongs to you.

  Source: https://github.com/misesdev/utx-wallet

