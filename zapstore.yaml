# zapstore.yaml — UTX Wallet
# Configuration for zapstore-cli (https://github.com/zapstore/zapstore-cli)
# Publishes app metadata and releases to the Zap Store (https://zapstore.dev),
# a decentralized Nostr-based app store for Android apps.

identifier: com.misesdev.utxwallet
name: UTX Wallet

summary: Self-custodial Bitcoin wallet with personal node and full UTXO control

description: |
  Self-custodial Bitcoin wallet for Mainnet and Testnet4. Your keys never
  leave your device. Connect to your own node. Full UTXO control.

  YOUR KEYS, YOUR BITCOIN

  Keys stay on-device in encrypted storage, never transmitted. Create a
  wallet from a BIP39 mnemonic (12/24 words) with optional passphrase, or
  import via xpub/output descriptor for watch-only use.

  PERSONAL NODE — TRUE PRIVACY

  Connect to your own Mempool.space instance. All operations (sync, broadcast,
  fee estimation, wallet discovery) route through your node automatically once
  configured. Multiple nodes with priority ordering and optional public fallback.

  FULL UTXO CONTROL

  View every UTXO with value, address, and confirmation status. Freeze coins
  to exclude them from coin selection. RBF acceleration for stuck transactions.
  Send preview shows inputs and outputs Electrum-style.

  SECURITY

  • Biometric unlock on app open with PIN fallback
  • Screenshot prevention (FLAG_SECURE)
  • PIN + biometric auto-lock with configurable timeout
  • Balance hidden across all screens with eye-button reveal

  OPEN SOURCE — no ads, no analytics, no telemetry.

  Source: https://github.com/misesdev/utx-wallet

repository: https://github.com/misesdev/utx-wallet
license: MIT

